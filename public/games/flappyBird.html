<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Flappy Bird</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --green: #39ff14; --pink: #ff2d78; --cyan: #00f5ff;
      --yellow: #ffe600; --bg: #0a0a0f; --font: 'Press Start 2P', monospace;
    }
    body {
      background: var(--bg); display: flex; flex-direction: column;
      align-items: center; justify-content: center; height: 100vh;
      font-family: var(--font); overflow: hidden;
      background-image: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.15) 2px, rgba(0,0,0,0.15) 4px);
    }
    #hud { display: flex; justify-content: space-between; width: 320px; margin-bottom: 10px; }
    .hud-item { font-size: 0.48rem; color: var(--cyan); letter-spacing: 0.1em; }
    .hud-item span { color: var(--yellow); text-shadow: 0 0 8px var(--yellow); }
    #gameCanvas {
      border: 2px solid var(--yellow);
      box-shadow: 0 0 15px var(--yellow), 0 0 40px rgba(255,230,0,0.1);
      display: block; cursor: pointer;
    }
    #overlay {
      position: absolute; inset: 0; display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 1.2rem;
      background: rgba(10,10,15,0.92);
    }
    #overlay.hidden { display: none; }
    .overlay-title {
      font-size: clamp(0.7rem, 2vw, 1rem); color: var(--yellow);
      text-shadow: 0 0 12px var(--yellow); text-align: center; line-height: 2.2;
      animation: flicker 4s step-end infinite;
    }
    .overlay-title.lose { color: var(--pink); text-shadow: 0 0 12px var(--pink); animation: none; }
    .overlay-score { font-size: 0.55rem; color: var(--yellow); text-shadow: 0 0 8px var(--yellow); letter-spacing: 0.15em; }
    .hidden { display: none !important; }
    .btn {
      font-family: var(--font); font-size: 0.55rem; color: var(--bg);
      background: var(--yellow); border: none; padding: 0.6rem 1.2rem;
      cursor: pointer; letter-spacing: 0.1em; box-shadow: 0 0 12px var(--yellow); transition: transform 0.1s;
    }
    .btn:hover { transform: scale(1.05); }
    .hint { font-size: 0.38rem; color: #444; letter-spacing: 0.08em; text-align: center; line-height: 2.2; }
    @keyframes flicker { 0%,100%{opacity:1} 90%{opacity:1} 91%{opacity:0.3} 94%{opacity:1} 97%{opacity:0.3} }
  </style>
</head>
<body>
  <div id="hud">
    <div class="hud-item">SCORE <span id="scoreDisplay">0</span></div>
    <div class="hud-item">BEST  <span id="bestDisplay">0</span></div>
  </div>
  <div style="position:relative;">
    <canvas id="gameCanvas" width="320" height="500"></canvas>
    <div id="overlay">
      <div class="overlay-title" id="overlayTitle">🐦 FLAPPY<br>BIRD</div>
      <div class="overlay-score hidden" id="overlayScore"></div>
      <button class="btn" id="startBtn">▶ START</button>
      <div class="hint">ESPACIO / CLICK / TAP<br>para volar</div>
    </div>
  </div>

<script>
const canvas = document.getElementById('gameCanvas')
const ctx = canvas.getContext('2d')
const W = canvas.width, H = canvas.height

const overlay      = document.getElementById('overlay')
const overlayTitle = document.getElementById('overlayTitle')
const overlayScore = document.getElementById('overlayScore')
const startBtn     = document.getElementById('startBtn')
const scoreDisplay = document.getElementById('scoreDisplay')
const bestDisplay  = document.getElementById('bestDisplay')

const GRAVITY    = 0.38
const FLAP_FORCE = -7.2
const PIPE_W     = 44
const PIPE_GAP   = 148
const PIPE_SPEED = 2.6
const BIRD_SIZE  = 22
const BIRD_X     = 80

let bird, pipes, score, best = 0, running, raf, frameCount
let particles = []
let stars = Array.from({length:50}, ()=>({ x:Math.random()*W, y:Math.random()*H, s:Math.random()*1.5+0.5, b:Math.random()*Math.PI*2 }))

// ── Init ─────────────────────────────────────────────────────
function init() {
  bird = { y: H/2, vy: 0, angle: 0, flapping: 0 }
  pipes = []
  score = 0; frameCount = 0; running = true; particles = []
  updateHUD()
}

// ── Loop ─────────────────────────────────────────────────────
function tick() {
  if (!running) return
  update()
  draw()
  raf = requestAnimationFrame(tick)
}

function update() {
  frameCount++

  // Bird
  bird.vy    += GRAVITY
  bird.y     += bird.vy
  bird.angle  = Math.min(Math.PI/4, Math.max(-Math.PI/4, bird.vy * 0.06))
  if (bird.flapping > 0) bird.flapping--

  // Suelo / techo
  if (bird.y - BIRD_SIZE/2 <= 0 || bird.y + BIRD_SIZE/2 >= H) { die(); return }

  // Generar tuberías
  if (frameCount % 88 === 0) {
    const gapY = 80 + Math.random() * (H - 200)
    pipes.push({ x: W + PIPE_W, gapY, scored: false })
  }

  pipes.forEach(p => {
    p.x -= PIPE_SPEED

    // Colisión
    const bx = BIRD_X, by = bird.y, br = BIRD_SIZE/2 - 3
    if (bx+br > p.x && bx-br < p.x+PIPE_W) {
      if (by-br < p.gapY - PIPE_GAP/2 || by+br > p.gapY + PIPE_GAP/2) { die(); return }
    }

    // Punto
    if (!p.scored && p.x + PIPE_W < BIRD_X) {
      p.scored = true; score++
      spawnParticles(BIRD_X, bird.y, '#ffe600', 8)
      updateHUD()
    }
  })
  pipes = pipes.filter(p => p.x + PIPE_W > 0)
  updateParticles()
}

// ── Flap ─────────────────────────────────────────────────────
function flap() {
  if (!running) return
  bird.vy      = FLAP_FORCE
  bird.flapping = 8
  spawnParticles(BIRD_X, bird.y + BIRD_SIZE/2, '#ffe600', 4)
}

// ── Die ──────────────────────────────────────────────────────
function die() {
  cancelAnimationFrame(raf)
  running = false
  if (score > best) best = score
  spawnParticles(BIRD_X, bird.y, '#ff2d78', 20)

  setTimeout(() => {
    overlayTitle.textContent = '💀 GAME OVER'
    overlayTitle.className   = 'overlay-title lose'
    overlayScore.textContent = `SCORE: ${score}`
    overlayScore.classList.remove('hidden')
    startBtn.textContent     = '↺ RETRY'
    overlay.classList.remove('hidden')
  }, 350)
}

// ── Partículas ───────────────────────────────────────────────
function spawnParticles(x, y, color, n) {
  for (let i=0;i<n;i++) {
    const a=Math.random()*Math.PI*2, s=1+Math.random()*3
    particles.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,life:1,color,size:2+Math.random()*3})
  }
}
function updateParticles() {
  particles = particles.filter(p=>{p.x+=p.vx;p.y+=p.vy;p.life-=0.05;return p.life>0})
}

// ── Draw ─────────────────────────────────────────────────────
function draw() {
  ctx.fillStyle = 'rgba(10,10,15,0.88)'
  ctx.fillRect(0,0,W,H)

  drawStars()
  drawPipes()
  drawBird()
  drawGround()
  drawParticles()
}

function drawStars() {
  stars.forEach(s => {
    s.b += 0.015
    ctx.fillStyle = `rgba(255,255,255,${0.2 + Math.abs(Math.sin(s.b))*0.35})`
    ctx.fillRect(s.x, s.y, s.s, s.s)
  })
}

function drawPipes() {
  pipes.forEach(p => {
    const topH   = p.gapY - PIPE_GAP/2
    const botY   = p.gapY + PIPE_GAP/2
    const botH   = H - botY

    // Tubería superior
    drawPipe(p.x, 0, PIPE_W, topH, true)
    // Tubería inferior
    drawPipe(p.x, botY, PIPE_W, botH, false)

    // Brillo en el gap
    const glow = ctx.createLinearGradient(p.x, topH, p.x, botY)
    glow.addColorStop(0, 'rgba(0,245,255,0.12)')
    glow.addColorStop(0.5, 'rgba(0,245,255,0)')
    glow.addColorStop(1, 'rgba(0,245,255,0.12)')
    ctx.fillStyle = glow
    ctx.fillRect(p.x, topH, PIPE_W, PIPE_GAP)
  })
}

function drawPipe(x, y, w, h, isTop) {
  const capH = 14, capExtra = 5
  ctx.fillStyle  = '#0a3a0a'
  ctx.shadowColor = '#39ff14'; ctx.shadowBlur = 8
  ctx.fillRect(x, y, w, h)

  // Cap
  ctx.fillStyle = '#0d500d'
  if (isTop) ctx.fillRect(x - capExtra, y + h - capH, w + capExtra*2, capH)
  else       ctx.fillRect(x - capExtra, y, w + capExtra*2, capH)

  // Brillo lateral
  ctx.fillStyle = 'rgba(57,255,20,0.15)'
  ctx.shadowBlur = 0
  ctx.fillRect(x+2, y, 4, h)
  ctx.fillRect(x + w - 6, y, 4, h)

  // Borde neón
  ctx.strokeStyle = '#39ff14'; ctx.lineWidth = 1.5
  ctx.shadowColor = '#39ff14'; ctx.shadowBlur = 6
  ctx.strokeRect(x, y, w, h)
  ctx.shadowBlur = 0
}

function drawBird() {
  ctx.save()
  ctx.translate(BIRD_X, bird.y)
  ctx.rotate(bird.angle)

  const r = BIRD_SIZE / 2

  // Cuerpo
  ctx.fillStyle  = '#ffe600'
  ctx.shadowColor = '#ffe600'; ctx.shadowBlur = 14
  ctx.beginPath(); ctx.arc(0, 0, r, 0, Math.PI*2); ctx.fill()

  // Ala (animada con flap)
  ctx.fillStyle = '#cc9900'
  ctx.shadowBlur = 0
  const wingY = bird.flapping > 0 ? -4 : 4
  ctx.beginPath()
  ctx.ellipse(-3, wingY, r*0.6, r*0.35, bird.flapping > 0 ? -0.4 : 0.4, 0, Math.PI*2)
  ctx.fill()

  // Ojo
  ctx.fillStyle = '#0a0a0f'
  ctx.beginPath(); ctx.arc(r*0.4, -r*0.2, r*0.22, 0, Math.PI*2); ctx.fill()
  ctx.fillStyle = '#fff'
  ctx.beginPath(); ctx.arc(r*0.45, -r*0.25, r*0.1, 0, Math.PI*2); ctx.fill()

  // Pico
  ctx.fillStyle = '#ff6600'
  ctx.beginPath()
  ctx.moveTo(r*0.7, r*0.1)
  ctx.lineTo(r*1.3, 0)
  ctx.lineTo(r*0.7, r*0.3)
  ctx.closePath(); ctx.fill()

  ctx.restore()
}

function drawGround() {
  ctx.fillStyle  = '#0a2a0a'
  ctx.shadowColor = '#39ff14'; ctx.shadowBlur = 6
  ctx.fillRect(0, H-6, W, 6)
  ctx.strokeStyle = '#39ff14'; ctx.lineWidth = 1
  ctx.beginPath(); ctx.moveTo(0,H-6); ctx.lineTo(W,H-6); ctx.stroke()
  ctx.shadowBlur = 0
}

function drawParticles() {
  particles.forEach(p => {
    ctx.globalAlpha = p.life
    ctx.fillStyle   = p.color
    ctx.shadowColor = p.color; ctx.shadowBlur = 6
    ctx.fillRect(p.x, p.y, p.size, p.size)
  })
  ctx.globalAlpha = 1; ctx.shadowBlur = 0
}

function updateHUD() {
  scoreDisplay.textContent = score
  bestDisplay.textContent  = Math.max(score, best)
}

// ── Controles ────────────────────────────────────────────────
document.addEventListener('keydown', e => { if (e.key===' ') { e.preventDefault(); flap() } })
canvas.addEventListener('pointerdown', flap)

startBtn.addEventListener('click', e => {
  e.stopPropagation()
  overlay.classList.add('hidden')
  cancelAnimationFrame(raf)
  init()
  raf = requestAnimationFrame(tick)
})
</script>
</body>
</html>
