<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Snake</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --green:  #39ff14;
      --pink:   #ff2d78;
      --cyan:   #00f5ff;
      --yellow: #ffe600;
      --bg:     #0a0a0f;
      --font:   'Press Start 2P', monospace;
    }

    body {
      background: var(--bg);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      font-family: var(--font);
      overflow: hidden;
      background-image: repeating-linear-gradient(
        0deg, transparent, transparent 2px,
        rgba(0,0,0,0.15) 2px, rgba(0,0,0,0.15) 4px
      );
    }

    /* ── HUD ── */
    #hud {
      display: flex;
      justify-content: space-between;
      width: 400px;
      margin-bottom: 10px;
    }
    .hud-item { font-size: 0.5rem; color: var(--cyan); letter-spacing: 0.1em; }
    .hud-item span { color: var(--green); text-shadow: 0 0 8px var(--green); }

    /* ── Canvas ── */
    #gameCanvas {
      border: 2px solid var(--green);
      box-shadow: 0 0 15px var(--green), 0 0 40px rgba(57,255,20,0.2);
      display: block;
      image-rendering: pixelated;
    }

    /* ── Overlay (start / game over) ── */
    #overlay {
      position: absolute;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 1.2rem;
      background: rgba(10,10,15,0.88);
      inset: 0;
    }
    #overlay.hidden { display: none; }

    .overlay-title {
      font-size: clamp(0.8rem, 2.5vw, 1.2rem);
      color: var(--green);
      text-shadow: 0 0 10px var(--green), 0 0 30px rgba(57,255,20,0.5);
      text-align: center;
      line-height: 2;
      animation: flicker 3s step-end infinite;
    }
    .overlay-title.red { color: var(--pink); text-shadow: 0 0 10px var(--pink); animation: none; }

    .overlay-score {
      font-size: 0.6rem;
      color: var(--yellow);
      text-shadow: 0 0 8px var(--yellow);
      letter-spacing: 0.15em;
    }

    .btn {
      font-family: var(--font);
      font-size: 0.55rem;
      color: var(--bg);
      background: var(--green);
      border: none;
      padding: 0.6rem 1.2rem;
      cursor: pointer;
      letter-spacing: 0.1em;
      box-shadow: 0 0 12px var(--green);
      transition: transform 0.1s;
    }
    .btn:hover { transform: scale(1.05); box-shadow: 0 0 24px var(--green); }

    .hint {
      font-size: 0.4rem;
      color: #444;
      letter-spacing: 0.1em;
      text-align: center;
      line-height: 2;
    }

    @keyframes flicker {
      0%,100%{opacity:1} 92%{opacity:1} 93%{opacity:0.4} 96%{opacity:1} 98%{opacity:0.4}
    }
  </style>
</head>
<body>

  <div id="hud">
    <div class="hud-item">SCORE <span id="scoreDisplay">0</span></div>
    <div class="hud-item">BEST  <span id="bestDisplay">0</span></div>
    <div class="hud-item">LVL   <span id="levelDisplay">1</span></div>
  </div>

  <div style="position:relative;">
    <canvas id="gameCanvas" width="400" height="400"></canvas>

    <div id="overlay">
      <div class="overlay-title" id="overlayTitle">🐍 SNAKE</div>
      <div class="overlay-score hidden" id="overlayScore"></div>
      <button class="btn" id="startBtn">▶ START</button>
      <div class="hint">WASD / FLECHAS para mover<br>P para pausar</div>
    </div>
  </div>

<script>
const canvas  = document.getElementById('gameCanvas')
const ctx     = canvas.getContext('2d')
const overlay = document.getElementById('overlay')
const overlayTitle = document.getElementById('overlayTitle')
const overlayScore = document.getElementById('overlayScore')
const startBtn     = document.getElementById('startBtn')
const scoreDisplay = document.getElementById('scoreDisplay')
const bestDisplay  = document.getElementById('bestDisplay')
const levelDisplay = document.getElementById('levelDisplay')

// ── Config ──────────────────────────────────────────────────
const COLS = 20, ROWS = 20
const CELL = canvas.width / COLS   // 20px

let snake, dir, nextDir, food, score, best, level, gameLoop, paused, running

// ── Init ────────────────────────────────────────────────────
function init() {
  snake   = [{ x: 10, y: 10 }, { x: 9, y: 10 }, { x: 8, y: 10 }]
  dir     = { x: 1, y: 0 }
  nextDir = { x: 1, y: 0 }
  score   = 0
  level   = 1
  paused  = false
  running = true
  placeFood()
  updateHUD()
}

function placeFood() {
  do {
    food = {
      x: Math.floor(Math.random() * COLS),
      y: Math.floor(Math.random() * ROWS)
    }
  } while (snake.some(s => s.x === food.x && s.y === food.y))
}

// ── Loop ────────────────────────────────────────────────────
function getSpeed() { return Math.max(80, 200 - (level - 1) * 15) }

function startGameLoop() {
  clearInterval(gameLoop)
  gameLoop = setInterval(tick, getSpeed())
}

function tick() {
  if (paused || !running) return

  dir = { ...nextDir }

  const head = { x: snake[0].x + dir.x, y: snake[0].y + dir.y }

  // colisión con paredes
  if (head.x < 0 || head.x >= COLS || head.y < 0 || head.y >= ROWS) return gameOver()
  // colisión consigo mismo
  if (snake.some(s => s.x === head.x && s.y === head.y)) return gameOver()

  snake.unshift(head)

  if (head.x === food.x && head.y === food.y) {
    score += 10 * level
    if (score >= level * 50) { level++; startGameLoop() }
    placeFood()
  } else {
    snake.pop()
  }

  updateHUD()
  draw()
}

// ── Draw ────────────────────────────────────────────────────
function draw() {
  // Fondo
  ctx.fillStyle = '#0a0a0f'
  ctx.fillRect(0, 0, canvas.width, canvas.height)

  // Grid sutil
  ctx.strokeStyle = 'rgba(30,30,58,0.5)'
  ctx.lineWidth = 0.5
  for (let i = 0; i <= COLS; i++) {
    ctx.beginPath(); ctx.moveTo(i * CELL, 0); ctx.lineTo(i * CELL, canvas.height); ctx.stroke()
  }
  for (let j = 0; j <= ROWS; j++) {
    ctx.beginPath(); ctx.moveTo(0, j * CELL); ctx.lineTo(canvas.width, j * CELL); ctx.stroke()
  }

  // Serpiente
  snake.forEach((seg, i) => {
    const alpha = 1 - (i / snake.length) * 0.6
    ctx.fillStyle = i === 0 ? '#39ff14' : `rgba(57,255,20,${alpha})`
    ctx.shadowColor = '#39ff14'
    ctx.shadowBlur  = i === 0 ? 15 : 6
    ctx.fillRect(seg.x * CELL + 1, seg.y * CELL + 1, CELL - 2, CELL - 2)
  })

  // Ojos de la cabeza
  const h = snake[0]
  ctx.fillStyle = '#0a0a0f'
  ctx.shadowBlur = 0
  const eyeSize = 3
  if (dir.x === 1)       { ctx.fillRect(h.x*CELL+14, h.y*CELL+4,  eyeSize, eyeSize); ctx.fillRect(h.x*CELL+14, h.y*CELL+13, eyeSize, eyeSize) }
  else if (dir.x === -1) { ctx.fillRect(h.x*CELL+3,  h.y*CELL+4,  eyeSize, eyeSize); ctx.fillRect(h.x*CELL+3,  h.y*CELL+13, eyeSize, eyeSize) }
  else if (dir.y === -1) { ctx.fillRect(h.x*CELL+4,  h.y*CELL+3,  eyeSize, eyeSize); ctx.fillRect(h.x*CELL+13, h.y*CELL+3,  eyeSize, eyeSize) }
  else                   { ctx.fillRect(h.x*CELL+4,  h.y*CELL+14, eyeSize, eyeSize); ctx.fillRect(h.x*CELL+13, h.y*CELL+14, eyeSize, eyeSize) }

  // Comida (parpadeo)
  const pulse = 0.6 + 0.4 * Math.sin(Date.now() / 200)
  ctx.fillStyle = `rgba(255,45,120,${pulse})`
  ctx.shadowColor = '#ff2d78'
  ctx.shadowBlur  = 15 * pulse
  ctx.fillRect(food.x * CELL + 2, food.y * CELL + 2, CELL - 4, CELL - 4)
  ctx.shadowBlur = 0
}

// ── Game Over ───────────────────────────────────────────────
function gameOver() {
  clearInterval(gameLoop)
  running = false
  if (score > best) best = score
  bestDisplay.textContent = best

  overlayTitle.textContent = 'GAME OVER'
  overlayTitle.className = 'overlay-title red'
  overlayScore.textContent = `SCORE: ${score}`
  overlayScore.classList.remove('hidden')
  startBtn.textContent = '↺ RETRY'
  overlay.classList.remove('hidden')
}

// ── HUD ─────────────────────────────────────────────────────
function updateHUD() {
  scoreDisplay.textContent = score
  bestDisplay.textContent  = best || 0
  levelDisplay.textContent = level
}

// ── Controles ───────────────────────────────────────────────
const keyMap = {
  ArrowUp: {x:0,y:-1}, w:{x:0,y:-1}, W:{x:0,y:-1},
  ArrowDown:{x:0,y:1}, s:{x:0,y:1},  S:{x:0,y:1},
  ArrowLeft:{x:-1,y:0},a:{x:-1,y:0}, A:{x:-1,y:0},
  ArrowRight:{x:1,y:0},d:{x:1,y:0},  D:{x:1,y:0},
}

document.addEventListener('keydown', e => {
  if (e.key === 'p' || e.key === 'P') {
    if (!running) return
    paused = !paused
    return
  }
  const newDir = keyMap[e.key]
  if (!newDir) return
  e.preventDefault()
  // no permitir ir en dirección opuesta
  if (newDir.x === -dir.x && newDir.y === -dir.y) return
  nextDir = newDir
})

// ── Start button ────────────────────────────────────────────
startBtn.addEventListener('click', () => {
  overlay.classList.add('hidden')
  init()
  startGameLoop()
  // redibujar en loop para la comida pulsante
  function renderLoop() { if (running && !paused) draw(); requestAnimationFrame(renderLoop) }
  renderLoop()
})
</script>
</body>
</html>
